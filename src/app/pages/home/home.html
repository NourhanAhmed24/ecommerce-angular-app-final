
<app-navbar></app-navbar>




<div id="luxuryCarousel"
     class="carousel slide carousel-fade"
     data-bs-ride="carousel"
     data-bs-interval="4000">

  <div class="carousel-inner">

    <!-- Slide 1 -->
    <div class="carousel-item active">
      <img src="assets/backg3.jpeg" class="d-block w-100 hero-img img-1" alt="">

      <div class="hero-content text-center">
        <h1 class="title">NEW COLLECTION</h1>
        <p class="subtitle">Timeless. Minimal. Elegant.</p>
        <button class="btn btn-outline-light btn-lg btn-luxury" (click)="goToShopNow()">
          Shop Now
        </button>
      </div>
    </div>

    <!-- Slide 2 -->
    <div class="carousel-item">
      <img src="assets/bw2.jfif" class="d-block w-100 hero-img" alt="">

      <div class="hero-content text-center">
        <h1 class="title">MONOCHROME</h1>
        <p class="subtitle">Black & White Essentials</p>
        <button class="btn btn-outline-light btn-lg btn-luxury" (click)="goToShopNow()">
          Explore
        </button>
      </div>
    </div>

    <!-- Slide 3 -->
    <div class="carousel-item">
      <img src="assets/backg2.avif" class="d-block w-100 hero-img" alt="">

      <div class="hero-content text-center">
        <h1 class="title">ELEVATED BASICS</h1>
        <p class="subtitle">Refined everyday style</p>
        <button class="btn btn-outline-light btn-lg btn-luxury" (click)="goToShopNow()">
          View Collection
        </button>
      </div>
    </div>

  </div>

  <!-- Controls -->
  <button class="carousel-control-prev" type="button" data-bs-target="#luxuryCarousel" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button class="carousel-control-next" type="button" data-bs-target="#luxuryCarousel" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>

</div>


<div class="container mt-5">
  <h2 class="text-center mb-4">Shop by Category</h2>

  <div class="row">

    <div class="col-md-4">
      <div class="category-card cardImg">
        <img src="assets/women.webp">
        <h4>Women</h4>
      </div>
    </div>

    <div class="col-md-4">
      <div class="category-card cardImg">
        <img src="assets/men.jpg">
        <h4>Men</h4>
      </div>
    </div>

    <div class="col-md-4">
      <div class="category-card  cardImg">
        <img src="assets/accessories.webp">
        <h4>Accessories</h4>
      </div>
    </div>

  </div>
</div>


<div class="container mt-5">
  <h2 class="text-center mb-4">Featured Products</h2>

  <div class="row" >
    <div class="col-md-3 mb-4" *ngFor="let product of products; trackBy: trackById">
      <div class="card product-card" (click)="goToDetails(product.id)">
        <img [src]="product.image" class="card-img-top cardImg">

        <div class="card-body text-center">
          <h6>{{ product.name }}</h6>
          <p>${{ product.price }}</p>
          <button class="btn btn-outline-dark btn-sm">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>
</div>

<section class="sale-banner text-center">
  <h2>Winter Sale</h2>
  <p>Up to 40% OFF</p>
  <button class="btn btn-light">Shop Sale</button>
</section>
