
<app-navbar></app-navbar>

<div class="container py-5" *ngIf="product; else notFound">

  <div class="row g-5">

  
    <div class="col-md-6 text-center">
      <div class="bg-light p-4 rounded shadow-sm">
        <img 
          [src]="product.image" 
          class="img-fluid rounded product-img"
         >
      </div>
    </div>

    <div class="col-md-6">

      <h2 class="fw-bold mb-3">{{ product.name }}</h2>

      <h4 class="text-dark mb-3">${{ product.price }}</h4>

      <p class="text-muted mb-4">
        This product combines style and comfort, making it perfect for everyday wear.
        High-quality fabric and modern design tailored for you.
      </p>

     
      <div class="mb-4">
        <label class="fw-semibold d-block mb-2">Size</label>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-dark btn-sm">S</button>
          <button class="btn btn-outline-dark btn-sm">M</button>
          <button class="btn btn-outline-dark btn-sm">L</button>
          <button class="btn btn-outline-dark btn-sm">XL</button>
        </div>
      </div>


      <div class="mb-4">
        <label class="fw-semibold">Quantity</label>
        <input type="number" class="form-control w-25 mt-2" value="1" min="1">
      </div>


      <div class="d-flex gap-3">
        <button class="btn btn-dark px-4">
          Add to Cart
        </button>

        <button class="btn btn-outline-dark px-4">
          Buy Now
        </button>
      </div>

    </div>
  </div>


  <hr class="my-5">


</div>


<ng-template #notFound>
  <div class="text-center py-5">
    <h3 class="text-danger">Product not found</h3>
  </div>
</ng-template>
